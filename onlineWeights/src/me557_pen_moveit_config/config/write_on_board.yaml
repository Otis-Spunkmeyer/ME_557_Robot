board_writer:
  ros__parameters:
    # Match offline export defaults so online write_on_board runs against
    # the same world-collision assumptions.
    scene_setup_enabled: true
    scene_setup_timeout_sec: 20.0
    scene_board_enabled: true
    scene_board_id: "writing_board"
    scene_board_center_x: 0.4139  # 16.1" from base + 0.5cm half-thickness
    scene_board_center_y: 0.0
    scene_board_center_z: 0.2286
    scene_board_size_x: 0.01
    scene_board_size_y: 0.45
    scene_board_size_z: 0.40

    # ── BOARD CALIBRATION DEFAULTS (edit these 3 values) ───────────────────
    # This is the primary/default tuning path for real hardware.
    # 1) scene_board_distance_from_robot_m:
    #      moves the whole board in/out from the robot (all 4 corners X).
    #      Increase = board farther, decrease = board closer.
    # 2) scene_board_cal_tilt_vertical_deg:
    #      + top edge tips toward robot, - top edge tips away.
    # 3) scene_board_cal_tilt_horizontal_deg:
    #      + right edge tips toward robot, - left edge tips toward robot.
    scene_board_use_calibration_block: true
    scene_board_distance_from_robot_m: 0.4385 # lowered made it go further
    scene_board_cal_tilt_vertical_deg: -10.6 # negative made bottom come closer
    scene_board_cal_tilt_horizontal_deg: -4.0 # positive made right side come closer
    # --- Four-corner board definition ---
    # Corners are defined in world (base_link) frame.
    # Order: bottom-left, bottom-right, top-right, top-left
    # (left/right from the robot's perspective looking at the board)
    # Pre-filled to exactly match the current center/size config above:
    #   center=(0.4139, 0.0, 0.2286), size_y=0.45 (half=0.225), size_z=0.40 (half=0.200)
    #   Board face normal is along +X; corners lie at X = center_x = 0.4139
    scene_board_corner_bl_x: 0.4139    # bottom-left  X
    scene_board_corner_bl_y: -0.225    # bottom-left  Y  (center_y - half_width)
    scene_board_corner_bl_z:  0.0286   # bottom-left  Z  (center_z - half_height = 0.2286 - 0.200)

    scene_board_corner_br_x: 0.4139    # bottom-right X
    scene_board_corner_br_y:  0.225    # bottom-right Y  (center_y + half_width)
    scene_board_corner_br_z:  0.0286   # bottom-right Z

    scene_board_corner_tr_x: 0.4139    # top-right X
    scene_board_corner_tr_y:  0.225    # top-right Y
    scene_board_corner_tr_z:  0.4286   # top-right Z  (center_z + half_height = 0.2286 + 0.200)

    scene_board_corner_tl_x: 0.4139    # top-left X
    scene_board_corner_tl_y: -0.225    # top-left Y
    scene_board_corner_tl_z:  0.4286   # top-left Z

    # Legacy tilt fields kept for compatibility/older configs.
    # Runtime uses scene_board_cal_tilt_* as the default calibration source.
    scene_board_tilt_vertical_deg:    0.0
    scene_board_tilt_horizontal_deg:  0.0

    # Board thickness (metres) — used as the collision box depth along the normal axis
    scene_board_thickness: 0.01

    scene_table_enabled: false
    scene_table_id: "writing_table"
    scene_table_center_x: 0.0
    scene_table_center_y: -0.34
    scene_table_center_z: 0.10
    scene_table_size_x: 0.60
    scene_table_size_y: 0.60
    scene_table_size_z: 0.05

    # Use absolute board-space waypoints so the pen tip traces the full path.
    relative_to_current_pose: false
    relative_scale: 1.0
    cartesian: true
    # Balanced planning profile:
    # - Prefer Cartesian lines
    # - Allow non-Cartesian fallback only when Cartesian fails
    # - Keep a joint-span guard to reject extreme branch flips
    fallback_to_noncartesian: true
    cartesian_max_step: 0.0025
    cartesian_fraction_threshold: 0.97
    weight_orientation: 1.0
    tolerance_orientation: 0.25
    max_joint_span_rad: 1.2  # 0.8 was too tight: shoulder spans ~0.9 rad on legitimate horizontal strokes

    # --- Sim-to-real fidelity knobs ---
    # These scale the joint_limits.yaml max values before MoveIt parameterizes
    # the trajectory.  1.0 = use the full limit; 0.7 = 70% of limit.
    # Reduce if the real robot can't track the planned profile:
    #   velocity_scaling: 0.7 means servos get 30% headroom to recover from lag.
    #   acceleration_scaling: 0.5 means gentler ramps at direction changes.
    velocity_scaling: 0.8
    acceleration_scaling: 0.6
    # Retract depth: distance from robot base to the pen's lifted/travel position.
    # Default inch(14.5) = 0.3683 m.  If the spring-loaded marker tip still brushes
    # the board during lateral travel, DECREASE this value to pull the arm further
    # back (e.g. 0.356 = ~14", 0.330 = ~13", 0.305 = ~12").
    pen_retract_forward_m: 0.3683
    # Diagonal retract clearance: the FIRST retract waypoint is z_end + this value,
    # so the arm pulls back AND lifts simultaneously.  The vertical component breaks
    # spring contact almost immediately; any remaining drag mark is only pen_clearance_z_m
    # tall instead of the full z_end→z_top sweep.  Increase if a short diagonal stub
    # is still visible.  Default 0.015 m (15 mm).
    pen_clearance_z_m: 0.015
    # Rotate path in the board plane (+90 deg CCW about Z).
    semantic_yaw_deg: 90.0
    # Keep planning-scene board in base frame so it stays aligned with
    # the planned path coordinates.
    scene_frame_id: ""
    workspace_enforce_x_bounds: false
    workspace_x_min: -0.1778
    workspace_x_max: 0.1778
    workspace_z_min: 0.0
    workspace_z_max: 10.0
